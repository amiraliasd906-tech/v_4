name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build & sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Cache Gradle & Android build caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/cache
          key: gradle-${{ runner.os }}-${{ hashFiles('/*.gradle*', '/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: chmod +x ./gradlew
        run: chmod +x ./gradlew

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/release.keystore" \
            -alias divarsmartsearch \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass divar123456 -keypass divar123456 \
            -dname "CN=DivarSmartSearch, OU=Dev, O=Personal, L=Tehran, S=Tehran, C=IR"
          echo "RELEASE_KEYSTORE_PATH=$GITHUB_WORKSPACE/release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=divar123456" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=divarsmartsearch" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=divar123456" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          RELEASE_KEYSTORE_PATH: ${{ env.RELEASE_KEYSTORE_PATH }}
          RELEASE_KEYSTORE_PASSWORD: ${{ env.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ env.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ env.RELEASE_KEY_PASSWORD }}

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: DivarSmartSearch-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30deploy your project.
